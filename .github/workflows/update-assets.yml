name: Update Assets from Tandem Connect
on:
  repository_dispatch:
    types: [update-assets]
permissions:
  contents: write
jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Firebase Admin
        run: npm install firebase-admin
      - name: Update assets
        uses: actions/github-script@v7
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const incoming = ${{ toJson(github.event.client_payload) }};

            const urnToProject = {
              'urn:adsk.dtm:o7W79rDUSMm7DOS11uGiFw': 'abbott-mri-d',
              'urn:adsk.dtm:o1yVV15jRhyxTB5CUsSd1A': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:HIEG_rRmQaWdIfPybILB_Q': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:I8zS7A4ISR655jb8_Z32BA': 'je-dunn-atlanta-office',
            };

            const modelUrn = incoming.model || '';
            const projectId = urnToProject[modelUrn];

            if (!projectId) {
              console.log(`Unknown model URN: ${modelUrn}. Skipping.`);
              return;
            }

            const filePath = `app/data/assets/${projectId}.json`;
            console.log(`Writing to ${filePath} for model ${modelUrn}`);

            const maxRetries = 5;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              console.log(`Attempt ${attempt}...`);
              try {
                execSync('git pull origin main', { stdio: 'inherit' });

                let existing = { assets: [] };
                try {
                  if (fs.existsSync(filePath)) {
                    existing = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                  }
                } catch (e) {
                  console.log('No existing file or parse error, starting fresh');
                }

                const assetMap = new Map();
                (existing.assets || []).forEach(a => assetMap.set(a.assetId, a));
                (incoming.assets || []).forEach(a => assetMap.set(a.assetId, a));
                const merged = Array.from(assetMap.values())
                  .sort((a, b) => a.assetId.localeCompare(b.assetId));

                const output = {
                  lastUpdated: new Date().toISOString(),
                  totalAssets: merged.length,
                  assets: merged
                };

                fs.mkdirSync('app/data/assets', { recursive: true });
                fs.writeFileSync(filePath, JSON.stringify(output, null, 2));
                console.log(`Merged ${incoming.assets?.length || 0} incoming, total now: ${merged.length}`);

                // Update Firestore assetCount by querying on the id field
                try {
                  const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
                  const admin = require('./node_modules/firebase-admin');
                  if (!admin.apps.length) {
                    admin.initializeApp({
                      credential: admin.credential.cert(serviceAccount)
                    });
                  }
                  const db = admin.firestore();
                  const snapshot = await db.collection('projects').where('id', '==', projectId).get();
                  if (!snapshot.empty) {
                    await snapshot.docs[0].ref.update({ assetCount: merged.length });
                    console.log(`Updated Firestore assetCount to ${merged.length} for ${projectId}`);
                  } else {
                    console.log(`No Firestore document found for project id: ${projectId}`);
                  }
                } catch (fbError) {
                  console.log(`Firestore update failed: ${fbError.message}`);
                }

                execSync('git config user.name "github-actions[bot]"');
                execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
                execSync(`git add ${filePath}`);
                try {
                  execSync('git diff --staged --quiet');
                  console.log('No changes to commit');
                  return;
                } catch (e) {}
                execSync(`git commit -m "Update assets for ${projectId} from Tandem Connect"`);
                execSync('git push', { stdio: 'inherit' });
                console.log('Success!');
                return;
              } catch (error) {
                console.log(`Attempt ${attempt} failed: ${error.message}`);
                if (attempt < maxRetries) {
                  execSync('git reset --hard origin/main');
                  await new Promise(r => setTimeout(r, 2000 + Math.random() * 3000));
                }
              }
            }
            throw new Error('Failed after max retries');
