name: Update Assets from Tandem Connect
on:
  repository_dispatch:
    types: [update-assets]
permissions:
  contents: write
jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Firebase Admin
        run: npm install firebase-admin
      - name: Update assets
        uses: actions/github-script@v7
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const incoming = ${{ toJson(github.event.client_payload) }};

            const urnToProject = {
              'urn:adsk.dtm:o7W79rDUSMm7DOS11uGiFw': 'abbott-mri-d',
              'urn:adsk.dtm:o1yVV15jRhyxTB5CUsSd1A': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:HIEG_rRmQaWdIfPybILB_Q': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:I8zS7A4ISR655jb8_Z32BA': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:0PxA7yNrTgy7_W-02ognsw': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:i4SuEcbORDqdMuAIoyh31Q': 'project-beacon',
              'urn:adsk.dtm:YKcdg6DJT9OjX-MaEaBjEg': 'project-beacon',
            };

            // Invert map: projectId -> Set of model URNs
            const projectModels = {};
            for (const [urn, proj] of Object.entries(urnToProject)) {
              if (!projectModels[proj]) projectModels[proj] = [];
              projectModels[proj].push(urn);
            }

            const modelUrn = incoming.model || '';
            const projectId = urnToProject[modelUrn];

            if (!projectId) {
              console.log(`Unknown model URN: ${modelUrn}. Skipping.`);
              return;
            }

            // Sanitize URN for use in filename
            const modelKey = modelUrn.replace(/[^a-zA-Z0-9_-]/g, '_');
            const stagingDir = `app/data/assets`;
            const modelStagingPath = `${stagingDir}/${projectId}.${modelKey}.staging.json`;
            const productionPath = `${stagingDir}/${projectId}.json`;

            console.log(`Processing batch ${incoming.batch}/${incoming.totalBatches} for model ${modelUrn}`);

            const maxRetries = 10;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              console.log(`Attempt ${attempt}...`);
              try {
                execSync('git pull --rebase origin main', { stdio: 'inherit' });

                fs.mkdirSync(stagingDir, { recursive: true });

                // Read existing staging for this model (unless first batch)
                let modelAssets = [];
                if (incoming.batch > 1 && fs.existsSync(modelStagingPath)) {
                  try {
                    modelAssets = JSON.parse(fs.readFileSync(modelStagingPath, 'utf8')).assets || [];
                  } catch (e) {
                    console.log('Could not read model staging, starting fresh for this model');
                  }
                }

                // Merge this batch into this model's staging
                const assetMap = new Map();
                modelAssets.forEach(a => assetMap.set(a.assetId, a));
                (incoming.assets || []).forEach(a => assetMap.set(a.assetId, a));
                const mergedModelAssets = Array.from(assetMap.values())
                  .sort((a, b) => a.assetId.localeCompare(b.assetId));

                const isModelComplete = incoming.totalBatches !== null
                  && incoming.batch >= incoming.totalBatches;

                if (!isModelComplete) {
                  // Write intermediate staging for this model only
                  fs.writeFileSync(modelStagingPath, JSON.stringify({
                    modelUrn,
                    lastBatch: incoming.batch,
                    totalBatches: incoming.totalBatches,
                    complete: false,
                    assets: mergedModelAssets
                  }, null, 2));
                  console.log(`Staged batch ${incoming.batch}/${incoming.totalBatches} for ${modelUrn}: ${mergedModelAssets.length} assets so far`);
                } else {
                  // This model is complete — write its final staging
                  fs.writeFileSync(modelStagingPath, JSON.stringify({
                    modelUrn,
                    lastBatch: incoming.batch,
                    totalBatches: incoming.totalBatches,
                    complete: true,
                    assets: mergedModelAssets
                  }, null, 2));
                  console.log(`Model ${modelUrn} complete: ${mergedModelAssets.length} assets`);

                  // Check if ALL models for this project are now complete
                  const allModelUrns = projectModels[projectId];
                  // Replace the allComplete check with this:
                  const allComplete = allModelUrns.every(urn => {
                    const key = urn.replace(/[^a-zA-Z0-9_-]/g, '_');
                    const path = `${stagingDir}/${projectId}.${key}.staging.json`;
                    
                    // If no staging file exists, check if this model already
                    // contributed to the current production file (i.e. it ran
                    // earlier and finalized). If so, treat it as implicitly complete.
                    if (!fs.existsSync(path)) {
                      // Missing staging file — either it hasn't run yet, or it
                      // already completed in a prior run. We can't distinguish
                      // these cases, so skip requirement for missing models.
                      return true;
                    }
                    try {
                      return JSON.parse(fs.readFileSync(path, 'utf8')).complete === true;
                    } catch (e) {
                      return false;
                    }
                  });

                  if (allComplete) {
                    console.log(`All models complete for ${projectId} — finalizing production file`);

                    // Merge all model staging files into one production file
                    const allAssetMap = new Map();
                    for (const urn of allModelUrns) {
                      const key = urn.replace(/[^a-zA-Z0-9_-]/g, '_');
                      const path = `${stagingDir}/${projectId}.${key}.staging.json`;
                      try {
                        const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                        (data.assets || []).forEach(a => allAssetMap.set(a.assetId, a));
                      } catch (e) {
                        console.log(`Warning: could not read staging for ${urn}`);
                      }
                    }

                    const finalAssets = Array.from(allAssetMap.values())
                      .sort((a, b) => a.assetId.localeCompare(b.assetId));

                    fs.writeFileSync(productionPath, JSON.stringify({
                      lastUpdated: new Date().toISOString(),
                      totalAssets: finalAssets.length,
                      assets: finalAssets
                    }, null, 2));

                    // Delete all staging files for this project
                    for (const urn of allModelUrns) {
                      const key = urn.replace(/[^a-zA-Z0-9_-]/g, '_');
                      const path = `${stagingDir}/${projectId}.${key}.staging.json`;
                      if (fs.existsSync(path)) fs.unlinkSync(path);
                    }

                    console.log(`Production file written: ${finalAssets.length} total assets for ${projectId}`);

                    // Update Firestore
                    try {
                      const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
                      const admin = require('./node_modules/firebase-admin');
                      if (!admin.apps.length) {
                        admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
                      }
                      const db = admin.firestore();
                      const snapshot = await db.collection('projects').where('id', '==', projectId).get();
                      if (!snapshot.empty) {
                        await snapshot.docs[0].ref.update({ assetCount: finalAssets.length });
                        console.log(`Updated Firestore assetCount to ${finalAssets.length} for ${projectId}`);
                      } else {
                        console.log(`No Firestore document found for project id: ${projectId}`);
                      }
                    } catch (fbError) {
                      console.log(`Firestore update failed: ${fbError.message}`);
                    }

                    execSync(`git add ${productionPath}`);
                    execSync(`git add -A ${stagingDir}/`);
                  } else {
                    // Not all models done yet — just stage this model's completion
                    console.log(`Model ${modelUrn} done, waiting on other models for ${projectId}`);
                    execSync(`git add ${modelStagingPath}`);
                  }
                }

                execSync('git config user.name "github-actions[bot]"');
                execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
                try {
                  execSync('git diff --staged --quiet');
                  console.log('No changes to commit');
                  return;
                } catch (e) {}
                execSync(`git commit -m "Update assets for ${projectId} (model ${modelUrn} batch ${incoming.batch}/${incoming.totalBatches})"`);
                execSync('git push', { stdio: 'inherit' });
                console.log('Success!');
                return;

              } catch (error) {
                console.log(`Attempt ${attempt} failed: ${error.message}`);
                if (attempt < maxRetries) {
                  execSync('git rebase --abort 2>/dev/null || true', { stdio: 'inherit' });
                  execSync('git reset --hard origin/main', { stdio: 'inherit' });
                  await new Promise(r => setTimeout(r, 3000 + Math.random() * 5000));
                }
              }
            }
            throw new Error('Failed after max retries');
