name: Update Assets from Tandem Connect
on:
  repository_dispatch:
    types: [update-assets]
permissions:
  contents: write
jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Firebase Admin
        run: npm install firebase-admin
      - name: Update assets
        uses: actions/github-script@v7
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const incoming = ${{ toJson(github.event.client_payload) }};

            const urnToProject = {
              'urn:adsk.dtm:o7W79rDUSMm7DOS11uGiFw': 'abbott-mri-d',
              'urn:adsk.dtm:o1yVV15jRhyxTB5CUsSd1A': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:HIEG_rRmQaWdIfPybILB_Q': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:I8zS7A4ISR655jb8_Z32BA': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:0PxA7yNrTgy7_W-02ognsw': 'je-dunn-atlanta-office',
              'urn:adsk.dtm:i4SuEcbORDqdMuAIoyh31Q': 'project-beacon',
              'urn:adsk.dtm:YKcdg6DJT9OjX-MaEaBjEg': 'project-beacon',
            };

            // Invert map: projectId -> array of model URNs
            const projectModels = {};
            for (const [urn, proj] of Object.entries(urnToProject)) {
              if (!projectModels[proj]) projectModels[proj] = [];
              projectModels[proj].push(urn);
            }

            const modelUrn = incoming.model || '';
            const projectId = urnToProject[modelUrn];

            if (!projectId) {
              console.log(`Unknown model URN: ${modelUrn}. Skipping.`);
              return;
            }

            const keyOf = urn => urn.replace(/[^a-zA-Z0-9_-]/g, '_');
            const stagingDir = 'app/data/assets';
            const stagingPathOf = urn => `${stagingDir}/${projectId}.${keyOf(urn)}.staging.json`;
            const modelStagingPath = stagingPathOf(modelUrn);
            const productionPath = `${stagingDir}/${projectId}.json`;

            const SCHEMA_VERSION = 2;
            const STALE_MS = 30 * 60 * 1000; // in-progress staging older than 30 min = abandoned sync

            const batchNum = Number(incoming.batch) || 1;
            const totalBatchesIn = incoming.totalBatches != null ? Number(incoming.totalBatches) : null;

            console.log(`Processing batch ${batchNum}/${totalBatchesIn} for model ${modelUrn} (${projectId})`);

            let finalized = false;
            let finalCount = 0;
            const maxRetries = 10;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              console.log(`Attempt ${attempt}...`);
              finalized = false;
              try {
                execSync('git pull --rebase origin main', { stdio: 'inherit' });
                fs.mkdirSync(stagingDir, { recursive: true });

                // ---- 1. Load this model's staging; reset if it belongs to a previous/abandoned sync ----
                let staging = null;
                if (fs.existsSync(modelStagingPath)) {
                  try { staging = JSON.parse(fs.readFileSync(modelStagingPath, 'utf8')); }
                  catch (e) { staging = null; }
                }
                const isStale = s =>
                  !s
                  || s.schemaVersion !== SCHEMA_VERSION
                  || s.complete === true   // last sync finished; an arriving batch means a NEW sync starts now
                  || !s.updatedAt
                  || (Date.now() - Date.parse(s.updatedAt)) > STALE_MS;

                if (isStale(staging)) {
                  if (staging) console.log('Existing staging is from a previous or abandoned sync — starting fresh for this model');
                  staging = { schemaVersion: SCHEMA_VERSION, modelUrn, totalBatches: null, batchesReceived: [], assets: [] };
                }

                // ---- 2. Merge this batch in (order-independent) ----
                if (totalBatchesIn != null) staging.totalBatches = totalBatchesIn;
                if (!staging.batchesReceived.includes(batchNum)) staging.batchesReceived.push(batchNum);
                staging.batchesReceived.sort((a, b) => a - b);

                const assetMap = new Map();
                (staging.assets || []).forEach(a => assetMap.set(a.assetId, a));
                (incoming.assets || []).forEach(a => assetMap.set(a.assetId, a));
                staging.assets = Array.from(assetMap.values())
                  .sort((a, b) => a.assetId.localeCompare(b.assetId));

                staging.complete = staging.totalBatches != null
                  && staging.batchesReceived.length >= staging.totalBatches;
                staging.updatedAt = new Date().toISOString();

                fs.writeFileSync(modelStagingPath, JSON.stringify(staging, null, 2));
                execSync(`git add "${modelStagingPath}"`);
                console.log(`Staged batches [${staging.batchesReceived.join(',')}] of ${staging.totalBatches} for ${modelUrn}: ${staging.assets.length} assets, complete=${staging.complete}`);

                // ---- 3. If this model just completed, rebuild production when ALL models are complete ----
                // Staging files are never deleted; they persist as each model's last-known-good
                // asset set. After the first full sync, finalization can no longer deadlock.
                if (staging.complete) {
                  const peers = projectModels[projectId].map(urn => {
                    if (urn === modelUrn) return { urn, data: staging };
                    const p = stagingPathOf(urn);
                    if (!fs.existsSync(p)) return { urn, data: null };
                    try { return { urn, data: JSON.parse(fs.readFileSync(p, 'utf8')) }; }
                    catch (e) { return { urn, data: null }; }
                  });

                  const waiting = peers.filter(p => !p.data || p.data.complete !== true);
                  if (waiting.length === 0) {
                    console.log(`All models complete for ${projectId} — rebuilding production file`);
                    const allMap = new Map();
                    for (const p of peers) {
                      (p.data.assets || []).forEach(a => allMap.set(a.assetId, a));
                    }
                    const finalAssets = Array.from(allMap.values())
                      .sort((a, b) => a.assetId.localeCompare(b.assetId));

                    fs.writeFileSync(productionPath, JSON.stringify({
                      lastUpdated: new Date().toISOString(),
                      totalAssets: finalAssets.length,
                      assets: finalAssets
                    }, null, 2));
                    execSync(`git add "${productionPath}"`);
                    finalized = true;
                    finalCount = finalAssets.length;
                    console.log(`Production file written: ${finalCount} total assets for ${projectId}`);
                  } else {
                    console.log(`Model ${modelUrn} done; waiting on: ${waiting.map(p => p.urn).join(', ')}`);
                  }
                }

                // ---- 4. Commit & push ----
                execSync('git config user.name "github-actions[bot]"');
                execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
                let hasChanges = true;
                try { execSync('git diff --staged --quiet'); hasChanges = false; } catch (e) {}

                if (hasChanges) {
                  execSync(`git commit -m "Assets: ${projectId} (${modelUrn} batch ${batchNum}/${staging.totalBatches})${finalized ? ' + production rebuild' : ''}"`);
                  execSync('git push origin main', { stdio: 'inherit' });
                  console.log('Pushed successfully');
                } else {
                  console.log('No changes to commit');
                }
                break; // success — leave the retry loop

              } catch (error) {
                console.log(`Attempt ${attempt} failed: ${error.message}`);
                finalized = false;
                if (attempt >= maxRetries) {
                  throw new Error('Failed after max retries');
                }
                // Recover to a clean slate. reset --hard does NOT remove untracked files,
                // so also clean leftover staging files — otherwise the next pull --rebase
                // can fail forever on "untracked working tree files would be overwritten".
                execSync('git rebase --abort || true', { stdio: 'inherit' });
                execSync('git reset --hard origin/main', { stdio: 'inherit' });
                execSync(`git clean -fd "${stagingDir}" || true`, { stdio: 'inherit' });
                await new Promise(r => setTimeout(r, 2000 + Math.random() * 6000));
              }
            }

            // ---- 5. Firestore — only after the production rebuild has actually been pushed ----
            if (finalized) {
              try {
                const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
                const admin = require(`${process.cwd()}/node_modules/firebase-admin`);
                if (!admin.apps.length) {
                  admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
                }
                const db = admin.firestore();
                const snapshot = await db.collection('projects').where('id', '==', projectId).get();
                if (!snapshot.empty) {
                  await snapshot.docs[0].ref.update({ assetCount: finalCount });
                  console.log(`Updated Firestore assetCount to ${finalCount} for ${projectId}`);
                } else {
                  console.log(`No Firestore document found for project id: ${projectId}`);
                }
              } catch (fbError) {
                console.log(`Firestore update failed: ${fbError.message}`);
              }
            }
